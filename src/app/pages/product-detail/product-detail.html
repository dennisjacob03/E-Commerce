<div class="container py-5">
  <div class="row g-5">
    <div class="col-lg-5">
      <div class="card border-0 shadow-lg p-4">
        <img
          src="{{ data.image }}"
          alt="{{ data.title }}"
          class="img-fluid product-image"
        />
      </div>
    </div>
    <div class="col-lg-7">
      <span class="badge bg-success mb-3"> In Stock </span>

      <h1 class="fw-bold mb-3">{{ data.title }}</h1>

      <p class="text-muted">
        {{ data.description }}
      </p>
      <div class="mb-3">
        <span class="text-warning fs-5"> ★★★★★ </span>

        <span class="text-muted"> ({{ data.rating.count }} Reviews) </span>
      </div>
      <div class="mb-4">
        <span class="display-6 fw-bold text-primary"> ₹{{ data.price }} </span>

        <!-- <span class="text-muted text-decoration-line-through ms-3"> ₹3,999 </span> -->

        <!-- <span class="badge bg-danger ms-2"> 20% OFF </span> -->
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold"> Quantity </label>

        <select class="form-select w-auto">
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
        </select>
      </div>
      <div class="d-flex gap-3 mb-4">
        <button class="btn btn-warning btn-lg px-4">
          Add to Cart
        </button>

        <button class="btn btn-dark btn-lg px-4">Buy Now</button>
      </div>
    </div>
  </div>
</div>
