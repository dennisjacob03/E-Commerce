<form>

  <div class="mb-3">
    <label class="form-label fw-semibold">
      Full Name
    </label>

    <input
      type="text"
      class="form-control"
      placeholder="Enter your full name"
    >
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">
      Email Address
    </label>

    <input
      type="email"
      class="form-control"
      placeholder="name@example.com"
    >
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">
      Phone Number
    </label>

    <input
      type="tel"
      class="form-control"
      placeholder="+91 98765 43210"
    >
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">
      Subject
    </label>

    <input
      type="text"
      class="form-control"
      placeholder="Enter subject"
    >
  </div>

  <div class="mb-4">
    <label class="form-label fw-semibold">
      Message
    </label>

    <textarea
      rows="5"
      class="form-control"
      placeholder="Write your message here..."
    ></textarea>
  </div>

  <button
    type="submit"
    class="btn btn-warning w-100 fw-bold"
  >
    Send Message
  </button>

</form>
